<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #000; height: 100vh; overflow: hidden; position: relative; font-family: sans-serif;}
  video { width: 100%; height: 100%; object-fit: contain; outline: none; }
  
  /* Custom Navigation Arrows Inside the iFrame */
  .nav-btn { 
    position: absolute; 
    top: 0; 
    bottom: 60px; /* Leave space for video controls */
    width: 15%; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    color: rgba(255,255,255,0); /* Invisible until hover */
    font-size: 4rem; 
    user-select: none; 
    z-index: 9999; 
    transition: all 0.3s ease;
    text-shadow: 0 0 10px rgba(0,0,0,0.8);
  }
  .nav-btn:hover { 
    color: rgba(255,255,255,0.9); 
    background: linear-gradient(to right, rgba(0,0,0,0.4), transparent);
  }
  .nav-btn.right:hover {
    background: linear-gradient(to left, rgba(0,0,0,0.4), transparent);
  }
  .left { left: 0; }
  .right { right: 0; }
</style>
</head>
<body>
  <video src="npuzzle.mp4" controls autoplay playsinline loop></video>
  
  <!-- Overlay Controls communicating to Parent Window -->
  <div class="nav-btn left" onclick="window.parent.jQuery('.poptrox-popup').trigger('poptrox_previous')">❮</div>
  <div class="nav-btn right" onclick="window.parent.jQuery('.poptrox-popup').trigger('poptrox_next')">❯</div>

  <!-- Capture Keyboard arrows and forward them to parent -->
  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight') {
        window.parent.jQuery('.poptrox-popup').trigger('poptrox_next');
      } else if (e.key === 'ArrowLeft') {
        window.parent.jQuery('.poptrox-popup').trigger('poptrox_previous');
      } else if (e.key === 'Escape') {
        window.parent.jQuery('.poptrox-popup').trigger('poptrox_close');
      }
    });
  </script>
</body>
</html>
